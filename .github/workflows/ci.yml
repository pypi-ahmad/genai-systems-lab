name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────
# Backend: Python tests, compile check, project evaluation
# Frontend: lint, typecheck, unit tests, production build
# ──────────────────────────────────────────────────────────

jobs:

  # ── Backend ───────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt', 'langgraph-data-analyst/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r langgraph-data-analyst/requirements.txt
          pip install pytest fastapi uvicorn httpx sqlalchemy

      - name: Compile check (all .py files)
        run: python -m compileall -q shared/ tests/ genai-*/ lg-*/ crew-*/

      - name: Run platform tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run project-level tests
        run: |
          python -m pytest langgraph-data-analyst/tests -v --tb=short
          python -m pytest crew-startup-simulator/tests/test_all.py -v --tb=short
          python -m pytest lg-research-agent/tests/test_main.py -v --tb=short

      - name: Run evaluation (requires API key)
        if: ${{ secrets.GOOGLE_API_KEY != '' }}
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python - <<'PY'
          import importlib.util, os
          from pathlib import Path

          path = Path("genai-research-system/eval.py")
          spec = importlib.util.spec_from_file_location("genai_research_eval", path)
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          module.run_project_eval_with_api_key(os.environ["GOOGLE_API_KEY"])
          PY

  # ── Frontend ──────────────────────────────────────────
  frontend:
    name: Frontend lint, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  # ── Docker build smoke test ───────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t genai-systems-lab:ci .
