name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────
# Backend: Python tests, compile check, project evaluation
# Frontend: lint, typecheck, unit tests, production build
# ──────────────────────────────────────────────────────────

jobs:

  # ── Backend platform ──────────────────────────────────
  backend-platform:
    name: Backend platform tests
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-platform-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest fastapi uvicorn httpx sqlalchemy

      - name: Compile check (shared + tests)
        run: python -m compileall -q shared/ tests/

      - name: Run platform tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run project-level tests
        run: |
          python -m pytest crew-startup-simulator/tests/test_all.py -v --tb=short
          python -m pytest lg-research-agent/tests/test_main.py -v --tb=short

      - name: Run evaluation (requires API key)
        if: ${{ env.GOOGLE_API_KEY != '' }}
        run: |
          python - <<'PY'
          import importlib.util, os
          from pathlib import Path

          path = Path("genai-research-system/eval.py")
          spec = importlib.util.spec_from_file_location("genai_research_eval", path)
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          module.run_project_eval_with_api_key(os.environ["GOOGLE_API_KEY"])
          PY

  # ── Promptfoo offline evals ───────────────────────────
  promptfoo-eval:
    name: Promptfoo offline evals
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run promptfoo model comparison
        if: ${{ env.GOOGLE_API_KEY != '' && env.OPENAI_API_KEY != '' && env.ANTHROPIC_API_KEY != '' }}
        working-directory: benchmarks/promptfoo
        run: npx promptfoo@latest eval --no-cache

      - name: Run promptfoo agent evaluation
        if: ${{ env.GOOGLE_API_KEY != '' && env.OPENAI_API_KEY != '' && env.ANTHROPIC_API_KEY != '' }}
        working-directory: benchmarks/promptfoo
        run: npx promptfoo@latest eval -c agent_eval.yaml --no-cache

      - name: Run promptfoo RAG retrieval evaluation
        if: ${{ env.GOOGLE_API_KEY != '' }}
        working-directory: benchmarks/promptfoo
        run: npx promptfoo@latest eval -c rag_retrieval_eval.yaml --no-cache

      - name: Run promptfoo RAG evaluation
        if: ${{ env.GOOGLE_API_KEY != '' && env.OPENAI_API_KEY != '' && env.ANTHROPIC_API_KEY != '' }}
        working-directory: benchmarks/promptfoo
        run: npx promptfoo@latest eval -c rag_eval.yaml --no-cache

  # ── Standalone project ────────────────────────────────
  backend-standalone-analyst:
    name: Standalone analyst tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-analyst-${{ hashFiles('langgraph-data-analyst/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install standalone analyst dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r langgraph-data-analyst/requirements.txt
          pip install pytest

      - name: Run standalone analyst tests
        run: python -m pytest langgraph-data-analyst/tests -v --tb=short

  # ── Frontend ──────────────────────────────────────────
  frontend:
    name: Frontend lint, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  # ── Docker build smoke test ───────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend-platform, backend-standalone-analyst]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t genai-systems-lab:ci .
