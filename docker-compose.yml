services:
  api:
    build: .
    image: genai-systems-lab:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Default to dev in local Compose so the ephemeral JWT secret path is
      # allowed.  Override in prod via your CI/deployment tooling.
      APP_ENV: ${APP_ENV:-dev}
    command:
      [
        "uvicorn",
        "shared.api.app:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--workers", "2",
        "--proxy-headers",
      ]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    read_only: false
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      # Persist the local SQLite database across restarts.
      - api-data:/app/.data

volumes:
  api-data:
