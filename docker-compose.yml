services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: ["uvicorn", "shared.api.app:app", "--host", "0.0.0.0", "--port", "8000"]

  ui:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: ["streamlit", "run", "shared/ui/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      - api
